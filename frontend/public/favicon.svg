  <!-- Connector 2→3 -->
  <line x1="23.5" y1="16" x2="25" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <polygon points="24.5,13.8 28.5,16 24.5,18.2" fill="white" opacity="0.3"/>

  <!-- Node 3 — faint -->
