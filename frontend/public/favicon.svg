<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#4338ca"/>

  <!-- Node 1 — solid white -->
  <circle cx="7" cy="16" r="3.5" fill="white"/>

  <!-- Connector 1→2 -->
